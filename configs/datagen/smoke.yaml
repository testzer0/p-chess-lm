# Small smoke-test config to verify the build_qa_dataset.py rewrite.
# Tiny budgets — finishes in seconds. All splits share the same shard
# (data/positions.jsonl) since this is just a wiring test.
seed: 0
pov: true
output_path: data/qa_smoke

tasks:
  piece_on_square:
    num_positions: 20
    num_questions: 3
  square_of_piece:
    num_positions: 15
    num_questions: 2
  piece_on_file:
    num_positions: 10
    num_questions: 2
  piece_on_rank:
    num_positions: 10
    num_questions: 2
  piece_on_diagonal:
    num_positions: 10
    num_questions: 3
  piece_count:
    num_positions: 10
    num_questions: 1
  material_count:
    num_positions: 10
    num_questions: 1

splits:
  train:
    shards: ["data/positions.jsonl"]
  val:
    shards: ["data/positions.jsonl"]
    num_positions: 5             # mode A: each FEN runs sample_all on every task
  test:
    shards: ["data/positions.jsonl"]
    per_task: 4                  # mode B: each task gets 4 positions
    num_questions: 2             #          and 2 questions per position
