# Stage-1 training — LLaVA arch, full fine-tune, POV tokens.
#   sbatch scripts/train_stage1_llava.sbatch
#
# Hyperparameters mirror the legacy stage1_flamingo_v1 run, with the agreed
# changes: llava (not flamingo), POV data, 30k steps (data has 50k worth).
# Global batch 256 = batch_size 8 * grad_accum 16 * 2 GPUs.
#
# Deviations from the legacy config the new trainer can't express (minor):
#   - AdamW betas: new uses (0.9, 0.999); legacy used (0.9, 0.95).
#   - LR floor: cosine decays to 0; legacy floored at min_lr_ratio=0.1.
#   - No gradient checkpointing (not needed — full-FT fits at bs8 on 2x H100).

# --- model ---
arch: llava
lora_rank: 0            # 0 = full fine-tune of the decoder (legacy freeze_lm=false)
dtype: bfloat16
decoder_path: /scratch/gpfs/DANQIC/ab4197/mydata/p-chess-lm/local/SmolLM3-3B-stage1-step-3440000
encoder_path: /scratch/gpfs/DANQIC/ab4197/mydata/p-chess-lm/data/engines/lc0_hf_bt5
embed_init: semantic

# --- data (POV, equal 1,828,572 records/task; concatenated to one arrow) ---
train_dataset: /scratch/gpfs/DANQIC/ab4197/mydata/p-chess-lm/data/stage1/train_all.arrow
eval_dataset:  /scratch/gpfs/DANQIC/ab4197/mydata/p-chess-lm/data/stage1/val_dataset.arrow
num_workers: 4

# --- training ---
batch_size: 8           # per-device micro-batch
grad_accum_steps: 16    # 8 * 16 * 2 GPUs = 256 global
max_seq_len: 384        # fits the verbose count-task CoT answers (max ~358 tok)
n_steps: 30000
lr: 1.0e-4
weight_decay: 0.1
scheduler: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0

# --- eval / checkpoint ---
eval_freq: 2000         # also the checkpoint cadence (enables --resume-from)
eval_batch_size: 8
eval_max_new_tokens: 384
eval_max_examples: 700  # full val set (100/task * 7)
log_samples: 4

# --- output ---
exp_name: stage1_llava_fullft_30k
output_dir: /scratch/gpfs/DANQIC/ab4197/mydata/p-chess-lm/runs
