# Sample Stage-1 datagen config. Copy and tweak for a real run.
#
#   python -m datagen.build_qa_dataset --config configs/sample_datagen.yaml
#
# CLI overrides for any nested field:
#   --override tasks.piece_on_square.num_positions=50000 \
#              splits.val.num_positions=2000 \
#              output_path=data/stage1_v2
#
# See datagen/README.md for the full schema reference.

seed: 0
pov: true                            # POV-relative tokens (M*/O*).
                                     # Set false for board-absolute (W*/B*).
output_path: data/stage1

# Train budget per task: how many positions to consume from the train shards,
# and how many distinct questions to generate per position. `num_questions`
# is silently capped at each task's MAX_UNIQUE_QUERIES.
tasks:
  piece_on_square:
    num_positions: 200000
    num_questions: 4
  square_of_piece:
    num_positions: 100000
    num_questions: 2
  piece_on_file:
    num_positions: 60000
    num_questions: 2
  piece_on_rank:
    num_positions: 60000
    num_questions: 2
  piece_on_diagonal:
    num_positions: 80000
    num_questions: 3
  piece_count:
    num_positions: 10000
    num_questions: 1
  material_count:
    num_positions: 10000
    num_questions: 1

splits:
  train:
    shards: ["data/lichess/train-*.jsonl"]    # paths or globs

  # val and test pick exactly ONE mode:
  #   num_positions: N
  #     Mode A. Take N unique positions; each task emits sample_all() on every
  #     position. Total records ≈ N × Σ MAX_UNIQUE_QUERIES (≈ N × 120 for the
  #     7 default tasks).
  #
  #   per_task: K   num_questions: Q
  #     Mode B. Each task pulls K positions sequentially; each position emits
  #     Q distinct queries (Q capped at MAX_UNIQUE_QUERIES per task).
  #     Total records ≈ K × Q × num_tasks (modulo capping).
  val:
    shards: ["data/lichess/val-*.jsonl"]
    num_positions: 1000              # Mode A — exhaustive per-position eval set

  test:
    shards: ["data/lichess/test-*.jsonl"]
    per_task: 500                    # Mode B — fixed per-task budget
    num_questions: 4
